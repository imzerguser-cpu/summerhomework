<!DOCTYPE html><html lang='ko'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>교사 페이지</title>
<script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=sFiBil8Nz1v4dhknf1BRbTH317eLFn_dqP35LPggZkvrqYOV8-4b4DNwBGs1KtI-7npLfUUn1UNS2yg3SqkG9UsKU5qthGUL6EsI-_DcUGa-SoD-74ZER_p-QHtDk-6xwElz_7VrRxFQ1gtWxbRG_jPTgXJG6iaaugxe9HCQPeYnN7PWHEljSfqBKY-AobkeO2w5fDTThVyoEpLioOTBHgt52BCfECEotc1Dg7FwQey9FozTc_0a14MpfzSqasbgtdux8sjkcewdXn6U0YdgS4oFRsPZdgEXzrxm919FTY6vEJHFbR3ZkZoYoLJAU2Do" charset="UTF-8"></script><style>
body{font-family:Arial;background:#eef3ff;margin:0}header{background:#3559d9;color:#fff;padding:18px;text-align:center}
.wrap{max-width:900px;margin:auto;padding:20px}.card{background:#fff;border-radius:10px;padding:16px;margin:14px 0;box-shadow:0 2px 6px #0002}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;text-align:center}
input{padding:6px}button{padding:7px 12px}
</style></head><body>
<header><h1>👨‍🏫 교사 관리 페이지</h1></header>
<div class='wrap'>
<div class='card'>
<h2>교사 비밀번호</h2>
<p>현재 비밀번호 : <b id='curPw'>20260301</b></p>
<input id='newPw' placeholder='새 비밀번호'>
<button onclick='changeTeacherPw()'>변경</button>
</div>

<div class='card'>
<h2>학생 비밀번호 관리</h2>
<table>
<tr><th>학생</th><th>비밀번호</th><th>변경</th></tr>
<tbody id='tb'></tbody>
</table>
</div>

<div class='card'>
<h2>오늘 숙제 현황(예시)</h2>
<table>
<tr><th>학생</th><th>영어</th><th>수학</th><th>줄넘기</th><th>완료</th></tr>
<tbody id='status'></tbody>
</table>
</div>
</div>
<script>
const students=["김대현","나대한","민주은","백은성","신서희"];
let teacherPw=localStorage.getItem("teacherPw")||"20260301";
curPw.textContent=teacherPw;
function changeTeacherPw(){
 const v=newPw.value.trim(); if(!v)return alert("새 비밀번호를 입력하세요.");
 teacherPw=v; localStorage.setItem("teacherPw",v); curPw.textContent=v; newPw.value=""; alert("변경되었습니다.");
}
const tb=document.getElementById("tb");
students.forEach(n=>{
 const key="pw_"+n;
 const pw=localStorage.getItem(key)||"1111";
 const tr=document.createElement("tr");
 tr.innerHTML=`<td>${n}</td><td><input id='i_${n}' value='${pw}'></td><td><button onclick="save('${n}')">저장</button></td>`;
 tb.appendChild(tr);
});
function save(n){
 const v=document.getElementById("i_"+n).value;
 localStorage.setItem("pw_"+n,v);
 alert(n+" 비밀번호 저장");
}
const st=document.getElementById("status");
students.forEach(n=>{
 const tr=document.createElement("tr");
 tr.innerHTML=`<td>${n}</td><td>❌</td><td>❌</td><td>❌</td><td></td>`;
 st.appendChild(tr);
});
</script></body></html>
