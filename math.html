<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛있는 구구단 - Times Tables Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF6B4A;
    --coral-dark:#E5532F;
    --mustard:#FFC93C;
    --mustard-dark:#E8AE12;
    --green:#3FA772;
    --green-dark:#2C7F55;
    --cream:#FFF7EC;
    --cream-2:#FFEFDA;
    --ink:#3A2B22;
    --ink-soft:#7A6A5D;
    --white:#FFFFFF;
    --red-soft:#FF7A70;
    --shadow: 0 8px 24px rgba(58,43,34,0.12);
    --shadow-sm: 0 4px 10px rgba(58,43,34,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,201,60,0.28) 0, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(63,167,114,0.20) 0, transparent 40%),
      var(--cream);
    font-family:'Nunito','Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:22px 18px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0;}
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:8px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Jua',sans-serif;
    font-size:22px;
    color:var(--coral-dark);
  }
  .brand .plate{
    width:34px;height:34px;border-radius:50%;
    background:var(--white);
    border:3px solid var(--coral);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex:none;
  }
  .navbtns{display:flex;gap:6px;}
  .homebtn{
    background:var(--white);
    border:none;
    border-radius:14px;
    padding:8px 12px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:12.5px;
    color:var(--ink-soft);
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    display:none;
    white-space:nowrap;
  }
  .homebtn.show{display:inline-block;}

  /* ---------- Hero / list screens ---------- */
  .hero{
    background:linear-gradient(135deg, var(--coral) 0%, #FF8A63 100%);
    border-radius:28px;
    padding:26px 24px;
    color:var(--white);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    margin-bottom:20px;
  }
  .hero::after{
    content:"✖️ ➗ 🔢 🧮 ⭐";
    position:absolute;
    right:-10px; bottom:-14px;
    font-size:28px;
    opacity:0.26;
    letter-spacing:6px;
  }
  .hero h1{
    font-family:'Jua',sans-serif;
    font-size:24px;
    line-height:1.4;
    margin-bottom:6px;
  }
  .hero p{
    margin:0;
    font-size:14px;
    opacity:0.92;
    line-height:1.6;
    max-width:82%;
  }
  .listcards{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  /* Grid layout for 2~9단 (4 x 2) */
  .tablegrid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
    margin-top:12px;
  }
  .tablecard{
    background:var(--white);
    border-radius:18px;
    padding:16px 8px;
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    aspect-ratio:1/1;
  }
  .tablecard:hover{transform:translateY(-2px); border-color:var(--mustard); box-shadow:var(--shadow);}
  .tablecard:active{transform:translateY(0) scale(0.97);}
  .tablecard .big{
    font-family:'Jua',sans-serif;
    font-size:34px;
    line-height:1;
    color:var(--white);
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tablecard .label{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:13px;
    color:var(--ink);
  }
  @media (max-width:420px){
    .tablegrid{gap:8px;}
    .tablecard{padding:12px 6px;}
    .tablecard .big{width:44px;height:44px;font-size:28px;}
    .tablecard .label{font-size:12px;}
  }
  .listcard{
    background:var(--white);
    border-radius:20px;
    padding:16px 16px;
    box-shadow:var(--shadow-sm);
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    border:2px solid transparent;
    transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    text-align:left;
  }
  .listcard:hover{transform:translateY(-2px); border-color:var(--mustard); box-shadow:var(--shadow);}
  .listcard:active{transform:translateY(0px) scale(0.99);}
  .listcard .num{
    flex:none;
    width:46px;height:46px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Jua',sans-serif;
    font-size:18px;
    color:var(--white);
  }
  .listcard .body{flex:1; min-width:0;}
  .listcard .body h3{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:15px;
    color:var(--ink);
    margin-bottom:3px;
    display:flex;
    flex-wrap:wrap;
    align-items:baseline;
    gap:6px;
  }
  .listcard .body h3 .titleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:12px;
    color:var(--ink-soft);
  }
  .listcard .body p{
    margin:0;
    font-size:12px;
    color:var(--ink-soft);
    line-height:1.5;
  }
  .listcard .tag{
    flex:none;
    font-size:10.5px;
    font-weight:800;
    padding:5px 9px;
    border-radius:20px;
    color:var(--white);
    white-space:nowrap;
  }

  /* ---------- Game screen ---------- */
  .gamehead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
    gap:10px;
  }
  .gamehead .titlewrap{display:flex;flex-direction:column;gap:2px; min-width:0;}
  .gamehead h2{
    font-family:'Jua',sans-serif;
    font-size:17px;
    color:var(--ink);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gameTitleEn{
    font-family:'Fredoka',sans-serif;
    font-weight:500;
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:1px;
  }
  .progresswrap{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:800;color:var(--ink-soft);
    margin-top:4px;
  }
  .progressbar{
    width:90px;height:8px;border-radius:6px;background:var(--cream-2);overflow:hidden;
  }
  .progressbar .fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s ease;}
  .score{
    background:var(--white);
    border-radius:14px;
    padding:7px 12px;
    font-weight:800;
    font-size:13px;
    box-shadow:var(--shadow-sm);
    color:var(--coral-dark);
    white-space:nowrap;
    flex:none;
  }

  .stage{
    background:var(--white);
    border-radius:26px;
    padding:26px 22px 22px;
    box-shadow:var(--shadow);
    min-height:340px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:16px;
    position:relative;
  }

  /* Question display */
  .question{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    color:var(--ink);
    margin-top:6px;
    flex-wrap:nowrap;
  }
  .question .num-box{
    background:var(--cream);
    border:3px solid var(--cream-2);
    border-radius:18px;
    min-width:64px;
    height:74px;
    padding:0 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    color:var(--coral-dark);
    box-shadow:var(--shadow-sm);
  }
  .question .op{
    font-family:'Jua',sans-serif;
    font-size:30px;
    color:var(--mustard-dark);
    padding:0 2px;
  }
  .question .answer-box{
    background:var(--white);
    border:3px dashed var(--mustard);
    border-radius:18px;
    min-width:80px;
    height:74px;
    padding:0 14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    color:var(--green-dark);
    box-shadow:var(--shadow-sm);
    transition:border-color .2s ease, background .2s ease;
  }
  .question .answer-box.filled{
    border-style:solid;
    border-color:var(--green);
    background:#F1FBF5;
  }
  .question .answer-box.wrong{
    border-color:var(--coral);
    background:#FFEDEA;
    color:var(--coral-dark);
  }
  .question .answer-box.empty{
    color:var(--ink-soft);
    opacity:0.5;
  }

  .transcript{
    min-height:20px;
    font-size:13px;
    color:var(--ink-soft);
    font-weight:700;
    text-align:center;
  }

  /* Microphone */
  .microw{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:4px 0 2px;
  }
  .micbtn{
    width:64px;height:64px;
    border-radius:50%;
    border:none;
    background:linear-gradient(135deg, var(--coral), var(--red-soft));
    color:var(--white);
    font-size:25px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(255,107,74,0.45);
    transition:transform .12s ease;
  }
  .micbtn:active{transform:scale(0.94);}
  .micbtn.listening{
    animation:pulse 1.1s infinite;
    background:linear-gradient(135deg, var(--green), #59C48A);
    box-shadow:0 6px 16px rgba(63,167,114,0.5);
  }
  .micbtn[disabled]{
    opacity:0.5;
    cursor:not-allowed;
    background:linear-gradient(135deg, #ccc, #aaa);
    box-shadow:none;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(63,167,114,0.55);}
    70%{box-shadow:0 0 0 18px rgba(63,167,114,0);}
    100%{box-shadow:0 0 0 0 rgba(63,167,114,0);}
  }
  .miclabel{
    font-size:12px;
    font-weight:800;
    color:var(--ink-soft);
    min-height:16px;
    text-align:center;
    margin-bottom:2px;
  }
  .notice{
    font-size:11.5px;
    color:var(--ink-soft);
    background:var(--cream-2);
    border-radius:10px;
    padding:8px 10px;
    text-align:center;
    line-height:1.5;
    width:100%;
  }
  .divider{
    display:flex;
    align-items:center;
    gap:8px;
    width:100%;
    color:var(--ink-soft);
    font-size:11px;
    font-weight:800;
    margin:4px 0;
    opacity:0.65;
  }
  .divider::before, .divider::after{
    content:'';
    flex:1;
    height:1px;
    background:var(--cream-2);
  }

  .controls{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    margin-top:auto;
    padding-top:6px;
  }

  .feedback{
    width:100%;
    border-radius:16px;
    padding:12px 16px;
    font-weight:800;
    font-size:14px;
    text-align:center;
    display:none;
  }
  .feedback.correct{
    display:block;
    background:#E7F7EE;
    color:var(--green-dark);
  }
  .feedback.wrong{
    display:block;
    background:#FFEDEA;
    color:var(--coral-dark);
  }
  .feedback .answer-reveal{
    display:block;
    margin-top:4px;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
  }

  /* Keypad */
  .keypad{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
  }
  .key{
    background:var(--white);
    border:2px solid var(--cream-2);
    border-radius:16px;
    padding:14px 0;
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:22px;
    color:var(--ink);
    cursor:pointer;
    transition:transform .1s ease, background .1s ease, border-color .1s ease;
    box-shadow:var(--shadow-sm);
  }
  .key:hover{background:var(--cream);border-color:var(--mustard);}
  .key:active{transform:scale(0.96);}
  .key.action{
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:14px;
  }
  .key.clear{color:var(--coral-dark);}
  .key.submit{
    background:var(--coral);
    color:var(--white);
    border-color:var(--coral);
    font-size:15px;
  }
  .key.submit:hover{background:var(--coral-dark);border-color:var(--coral-dark);}
  .key[disabled]{opacity:0.4;cursor:not-allowed;}

  .actionrow{
    display:flex;
    gap:10px;
    width:100%;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:14px;
    padding:12px 10px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:13.5px;
    cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  .btn:active{transform:scale(0.97);}
  .btn.primary{background:var(--coral);color:var(--white);}
  .btn.ghost{background:var(--cream-2);color:var(--ink-soft);}
  .btn.next{background:var(--green);color:var(--white);}
  .btn[disabled]{opacity:0.45;cursor:not-allowed;}
  .hidden{display:none !important;}

  /* Result */
  .resultbox{
    background:var(--white);
    border-radius:26px;
    padding:32px 22px;
    box-shadow:var(--shadow);
    text-align:center;
  }
  .resultbox .emoji{font-size:50px;margin-bottom:8px;}
  .resultbox h2{
    font-family:'Jua',sans-serif;
    font-size:22px;
    margin-bottom:6px;
  }
  .resultbox .scoreline{
    font-family:'Fredoka',sans-serif;
    font-size:34px;
    font-weight:700;
    color:var(--coral-dark);
    margin:12px 0 4px;
  }
  .resultbox .scoresub{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:16px;
  }
  .resultbox .time-line{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:700;
    margin-bottom:20px;
  }
  .resultactions{display:flex; flex-direction:column; gap:8px;}

  /* Wrong list on result */
  .wronglist{
    background:var(--cream);
    border-radius:16px;
    padding:12px 14px;
    margin:0 0 18px;
    text-align:left;
  }
  .wronglist h4{
    font-family:'Jua',sans-serif;
    font-size:13px;
    color:var(--coral-dark);
    margin-bottom:8px;
  }
  .wronglist ul{
    margin:0;
    padding:0;
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .wronglist li{
    font-family:'Fredoka',sans-serif;
    font-size:14px;
    color:var(--ink);
    display:flex;
    justify-content:space-between;
    padding:4px 0;
    border-bottom:1px dashed var(--cream-2);
  }
  .wronglist li:last-child{border-bottom:none;}
  .wronglist li .wanted{color:var(--green-dark);font-weight:600;}
  .wronglist li .yours{color:var(--coral-dark);font-weight:600;text-decoration:line-through;}

  .float-badge{
    position:fixed;
    pointer-events:none;
    font-size:26px;
    animation:floatUp 1s ease-out forwards;
    z-index:50;
  }
  @keyframes floatUp{
    0%{opacity:0; transform:translateY(0) scale(0.6);}
    20%{opacity:1; transform:translateY(-10px) scale(1.1);}
    100%{opacity:0; transform:translateY(-70px) scale(1);}
  }

  @media (max-width:420px){
    .question .num-box, .question .answer-box{
      min-width:56px;height:64px;font-size:30px;padding:0 10px;
    }
    .question .op{font-size:24px;}
    .hero h1{font-size:21px;}
    .hero p{max-width:100%;}
    .key{font-size:20px;padding:12px 0;}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand"><span class="plate">🧮</span> 맛있는 구구단 퀴즈</div>
    <div class="navbtns">
      <button class="homebtn" id="homeBtn">🏠 단 선택</button>
    </div>
  </div>

  <!-- SCREEN 0: 단 선택 -->
  <div id="screen-home">
    <div class="hero">
      <h1>구구단 연습<br>어느 단부터 해볼까요?</h1>
      <p>말하거나 눌러서 답을 입력해요. 한 글자 답은 <b>"이십사"</b>처럼 또렷하게, 짧은 숫자는 <b>"삼번"</b>, <b>"정답 사"</b>처럼 말하면 잘 인식돼요!</p>
    </div>
    <div class="listcards" id="randomList"></div>
    <div class="tablegrid" id="tableGrid"></div>
  </div>

  <!-- SCREEN 1: 게임 -->
  <div id="screen-game" class="hidden">
    <div class="gamehead">
      <div class="titlewrap">
        <h2 id="gameTitle">2단</h2>
        <div class="gameTitleEn" id="gameTitleEn">Times Table of 2</div>
        <div class="progresswrap">
          <div class="progressbar"><div class="fill" id="progressFill"></div></div>
          <span id="progressText">0 / 8</span>
        </div>
      </div>
      <div class="score">⭐ <span id="scoreText">0</span></div>
    </div>

    <div class="stage">
      <div class="question">
        <div class="num-box" id="qA">2</div>
        <div class="op">×</div>
        <div class="num-box" id="qB">2</div>
        <div class="op">=</div>
        <div class="answer-box empty" id="qAns">?</div>
      </div>

      <div class="transcript" id="transcript">답을 말하거나 눌러보세요</div>

      <div class="controls">
        <div class="feedback" id="feedback"></div>

        <div class="miclabel" id="micLabel">🎤 눌러서 답을 말해보세요</div>
        <div class="microw" id="micRow">
          <button class="micbtn" id="micBtn" title="눌러서 말하기">🎤</button>
        </div>
        <div class="notice hidden" id="micNotice">이 브라우저는 음성 인식을 지원하지 않아요. 아래 숫자 키패드로 입력해주세요!</div>

        <div class="divider">또는 눌러서 입력</div>

        <div class="keypad" id="keypad">
          <button class="key" data-k="1">1</button>
          <button class="key" data-k="2">2</button>
          <button class="key" data-k="3">3</button>
          <button class="key" data-k="4">4</button>
          <button class="key" data-k="5">5</button>
          <button class="key" data-k="6">6</button>
          <button class="key" data-k="7">7</button>
          <button class="key" data-k="8">8</button>
          <button class="key" data-k="9">9</button>
          <button class="key action clear" data-k="clear">← 지우기</button>
          <button class="key" data-k="0">0</button>
          <button class="key action submit" data-k="submit">확인</button>
        </div>

        <div class="actionrow">
          <button class="btn ghost" id="showAnswerBtn">정답 보기</button>
          <button class="btn next" id="nextBtn" disabled>다음 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: 결과 -->
  <div id="screen-result" class="hidden">
    <div class="resultbox">
      <div class="emoji" id="resultEmoji">🎉</div>
      <h2 id="resultTitle">잘했어요!</h2>
      <div class="scoreline"><span id="resultScore">0</span> / <span id="resultTotal">8</span></div>
      <div class="scoresub">정답을 맞춘 개수예요</div>
      <div class="time-line" id="resultTime">⏱️ 걸린 시간: 0초</div>
      <div id="wrongListWrap"></div>
      <div class="resultactions">
        <button class="btn primary" id="resultRetryBtn">🔁 이 단 다시 풀기</button>
        <button class="btn ghost" id="resultHomeBtn">🏠 다른 단 고르기</button>
      </div>
    </div>
  </div>
</div>

<script>
/* =========================================================
   구구단 퀴즈: 각 단 x*2 ~ x*9 (총 8문제)
   전체 랜덤 모드: 8단 x 8문제 = 64문제
========================================================= */

const TABLE_META = [
  {id:2, color:'#FF6B4A', label:'2단', en:'Table of 2', desc:'2를 여러 수와 곱해봐요'},
  {id:3, color:'#FFB23C', label:'3단', en:'Table of 3', desc:'3의 배수를 익혀요'},
  {id:4, color:'#3FA772', label:'4단', en:'Table of 4', desc:'4단은 짝수만 나와요'},
  {id:5, color:'#3C9EE8', label:'5단', en:'Table of 5', desc:'끝자리가 5 또는 0'},
  {id:6, color:'#B15CFF', label:'6단', en:'Table of 6', desc:'조금 어려워지는 6단'},
  {id:7, color:'#FF5C93', label:'7단', en:'Table of 7', desc:'까다로운 7단 도전'},
  {id:8, color:'#2BB0A6', label:'8단', en:'Table of 8', desc:'8단 완전 정복'},
  {id:9, color:'#F2994A', label:'9단', en:'Table of 9', desc:'마지막 관문 9단'},
  {id:'all', color:'#E85D75', label:'전체 랜덤', en:'All Mixed', desc:'2단~9단 64문제 도전!'},
];

let state = {
  tableId:null,
  pool:[],
  idx:0,
  score:0,
  answered:false,
  currentInput:'',
  wrongList:[],
  startTime:0,
  recognizing:false,
};

/* =========================================================
   한국어 숫자 파서 (오인식 대응 강화판)
   - 한글/영어/아라비아 숫자 모두 처리
   - 한 글자 오인식 흔한 케이스 매핑
========================================================= */

// 각 숫자별 흔한 오인식/유사음/영어 표기 매핑
const NUMBER_ALIASES = {
  0: ['영','공','제로','zero','o','오영'],
  1: ['1','일','한','하나','one','원','왼','인','린'],
  2: ['2','이','둘','두','two','투','리','니','히','미','기','지','피','비','디','티','씨','이이','e','ee','yi'],
  3: ['3','삼','셋','세','산','쌈','잠','참','탐','캄','함','람','남','담','샘','샴','sam','three','쓰리','뜨리','트리'],
  4: ['4','사','넷','네','샤','싸','자','짜','차','카','타','파','하','아','나','four','포','풔','폴','pour'],
  5: ['5','오','다섯','어','요','우','옹','옥','옷','옿','오오','five','파이브','파이','오와','와','와우'],
  6: ['6','육','여섯','유','률','릉','룩','숙','죽','축','북','독','녹','록','목','족','유크','유욱','yook','six','식스','씩스','씩'],
  7: ['7','칠','일곱','치','질','실','길','밀','필','빌','칠칠','chill','seven','세븐','쎄븐','쎄분'],
  8: ['8','팔','여덟','판','빨','발','알','갈','달','말','살','탈','팔팔','pal','eight','에잇','에이트','에잇트'],
  9: ['9','구','아홉','그','쿠','누','꾸','무','루','국','굳','굿','goo','koo','nine','나인','나이','나은']
};

// 정확 매치 룩업 테이블 생성
const ALIAS_LOOKUP = {};
Object.entries(NUMBER_ALIASES).forEach(([num, list])=>{
  list.forEach(a=>{
    ALIAS_LOOKUP[a.toLowerCase()] = Number(num);
  });
});

const KO_ONE = {영:0,공:0,일:1,이:2,삼:3,사:4,오:5,육:6,륙:6,칠:7,팔:8,구:9};

// 영어 두 자리 숫자 매핑
const EN_TEENS = {ten:10,eleven:11,twelve:12,thirteen:13,fourteen:14,fifteen:15,sixteen:16,seventeen:17,eighteen:18,nineteen:19};
const EN_TENS = {twenty:20,thirty:30,forty:40,fifty:50,sixty:60,seventy:70,eighty:80,ninety:90};
const EN_ONES = {zero:0,one:1,two:2,three:3,four:4,five:5,six:6,seven:7,eight:8,nine:9};

function parseKoreanNumber(text){
  if(text === null || text === undefined) return null;
  const rawLower = String(text).toLowerCase().trim();
  if(!rawLower) return null;

  // 1) 아라비아 숫자 (가장 신뢰)
  const digitMatch = rawLower.match(/\d+/);
  if(digitMatch){
    const n = Number(digitMatch[0]);
    if(n >= 0 && n <= 99) return n;
  }

  // 공백/기호 제거한 버전
  const s = rawLower.replace(/[\s,.\-!?'"·]/g, '');

  // 2) alias 정확 매치 (한글 오인식 + 영어 한 자리)
  if(ALIAS_LOOKUP[s] !== undefined) return ALIAS_LOOKUP[s];

  // 3) 영어 두 자리 (twenty four / twentyfour / twenty-four)
  if(EN_TEENS[s] !== undefined) return EN_TEENS[s];
  if(EN_TENS[s] !== undefined) return EN_TENS[s];
  const enTwo = s.match(/^(twenty|thirty|forty|fifty|sixty|seventy|eighty|ninety)(one|two|three|four|five|six|seven|eight|nine)?$/);
  if(enTwo){
    const tens = EN_TENS[enTwo[1]];
    const ones = enTwo[2] ? EN_ONES[enTwo[2]] : 0;
    return tens + ones;
  }

  // 4) 한글 십진법 정확 매치
  if(s === '십') return 10;
  const koTwo = s.match(/^([일이삼사오육륙칠팔구])?십([일이삼사오육륙칠팔구])?$/);
  if(koTwo){
    const tens = koTwo[1] ? KO_ONE[koTwo[1]] : 1;
    const ones = koTwo[2] ? KO_ONE[koTwo[2]] : 0;
    return tens * 10 + ones;
  }

  // 5) 반복 발음: "이이"→2, "삼삼"→3 (한 글자 강조용)
  const doubleKo = s.match(/^([일이삼사오육륙칠팔구])\1$/);
  if(doubleKo) return KO_ONE[doubleKo[1]];

  // 6) 텍스트 안에 한글 십의 자리 조합 부분 매치
  const anyKo = rawLower.match(/([일이삼사오육륙칠팔구])?\s*십\s*([일이삼사오육륙칠팔구])?/);
  if(anyKo){
    const tens = anyKo[1] ? KO_ONE[anyKo[1]] : 1;
    const ones = anyKo[2] ? KO_ONE[anyKo[2]] : 0;
    const v = tens * 10 + ones;
    if(v >= 10 && v <= 99) return v;
  }

  // 7) 부분 문자열에서 alias 스캔 (예: "정답 삼", "그건 4번")
  for(const [alias, num] of Object.entries(ALIAS_LOOKUP)){
    if(alias.length >= 2 && s.includes(alias)) return num;
  }

  // 8) 마지막으로 텍스트 내 한 글자 한글 숫자
  const singleKo = rawLower.match(/[영공일이삼사오육륙칠팔구]/);
  if(singleKo) return KO_ONE[singleKo[0]];

  return null;
}

/* =========================================================
   Speech Recognition 초기화
========================================================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

function initSpeech(){
  if(!SpeechRecognition){
    document.getElementById('micRow').classList.add('hidden');
    document.getElementById('micLabel').classList.add('hidden');
    document.getElementById('micNotice').classList.remove('hidden');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ko-KR';
  recognition.interimResults = false;
  recognition.continuous = false;
  recognition.maxAlternatives = 10;

  recognition.onstart = ()=>{
    state.recognizing = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '👂';
    document.getElementById('micLabel').textContent = '듣고 있어요... 답을 말해주세요';
    document.getElementById('transcript').textContent = '';
  };

  recognition.onend = ()=>{
    state.recognizing = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    if(!state.answered){
      document.getElementById('micLabel').textContent = '🎤 눌러서 답을 말해보세요';
    }
  };

  recognition.onerror = (e)=>{
    state.recognizing = false;
    const btn = document.getElementById('micBtn');
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      document.getElementById('micLabel').textContent = '마이크 사용 권한을 허용해주세요';
    } else if(e.error === 'no-speech'){
      document.getElementById('micLabel').textContent = '소리가 들리지 않았어요. 다시 시도해보세요';
    } else {
      document.getElementById('micLabel').textContent = '🎤 눌러서 답을 말해보세요';
    }
  };

  recognition.onresult = (e)=>{
    let parsed = null;
    let heard = '';
    const results = e.results[0];
    if(results[0]) heard = results[0].transcript.trim();

    // 모든 대안을 스캔, 구구단 답 범위(0~99) 안에 있는 첫 값 채택
    const candidates = [];
    for(let i=0; i<results.length; i++){
      const alt = (results[i].transcript || '').trim();
      if(!alt) continue;
      candidates.push(alt);
      const n = parseKoreanNumber(alt);
      if(n !== null && n >= 0 && n <= 99){
        parsed = n;
        heard = alt;
        break;
      }
    }

    document.getElementById('transcript').textContent = heard ? `들은 답: "${heard}"` : '';
    if(parsed !== null){
      state.currentInput = String(parsed);
      updateAnswerDisplay();
      setTimeout(()=>submitAnswer(), 350);
    } else {
      const tip = candidates.length ? `("${candidates[0]}" 로 들었어요)` : '';
      document.getElementById('micLabel').textContent = `숫자로 알아듣지 못했어요 ${tip} · 다시 시도해보세요`;
    }
  };
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

/* =========================================================
   POOL BUILDER
========================================================= */
function buildPool(tableId){
  const problems = [];
  if(tableId === 'all'){
    for(let a=2; a<=9; a++){
      for(let b=2; b<=9; b++){
        problems.push({a, b, answer:a*b});
      }
    }
  } else {
    const a = Number(tableId);
    for(let b=2; b<=9; b++){
      problems.push({a, b, answer:a*b});
    }
  }
  return shuffle(problems);
}

/* =========================================================
   SCREEN SWITCH
========================================================= */
function showScreen(id){
  ['screen-home','screen-game','screen-result'].forEach(s=>{
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
  document.getElementById('homeBtn').classList.toggle('show', id !== 'screen-home');
}

/* =========================================================
   HOME SCREEN
========================================================= */
function renderHome(){
  // 랜덤 모드 카드 (맨 위)
  const randomList = document.getElementById('randomList');
  randomList.innerHTML = '';
  const allMeta = TABLE_META.find(m=>m.id==='all');
  const randomCard = document.createElement('button');
  randomCard.className = 'listcard';
  randomCard.innerHTML = `
    <div class="num" style="background:${allMeta.color}">★</div>
    <div class="body">
      <h3>${allMeta.label} <span class="titleEn">${allMeta.en}</span></h3>
      <p>${allMeta.desc}</p>
    </div>
    <div class="tag" style="background:${allMeta.color}">64문제</div>
  `;
  randomCard.addEventListener('click', ()=>startGame('all'));
  randomList.appendChild(randomCard);

  // 2~9단 그리드 (4 x 2)
  const grid = document.getElementById('tableGrid');
  grid.innerHTML = '';
  TABLE_META.filter(m=>m.id!=='all').forEach(m=>{
    const card = document.createElement('button');
    card.className = 'tablecard';
    card.innerHTML = `
      <div class="big" style="background:${m.color}">${m.id}</div>
      <div class="label">${m.label}</div>
    `;
    card.addEventListener('click', ()=>startGame(m.id));
    grid.appendChild(card);
  });
}

/* =========================================================
   GAME
========================================================= */
function startGame(tableId){
  state.tableId = tableId;
  state.pool = buildPool(tableId);
  state.idx = 0;
  state.score = 0;
  state.wrongList = [];
  state.startTime = Date.now();

  const meta = TABLE_META.find(m=>m.id===tableId);
  document.getElementById('gameTitle').textContent = meta.label + ' 풀기';
  document.getElementById('gameTitleEn').textContent = meta.en;
  document.getElementById('scoreText').textContent = '0';

  showScreen('screen-game');
  renderQuestion();
}

function renderQuestion(){
  const p = state.pool[state.idx];
  state.answered = false;
  state.currentInput = '';

  document.getElementById('qA').textContent = p.a;
  document.getElementById('qB').textContent = p.b;

  const ansEl = document.getElementById('qAns');
  ansEl.textContent = '?';
  ansEl.classList.remove('filled','wrong');
  ansEl.classList.add('empty');

  document.getElementById('transcript').textContent = '답을 말하거나 눌러보세요';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('nextBtn').disabled = true;

  const pct = (state.idx / state.pool.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${state.idx} / ${state.pool.length}`;

  // Enable all keypad buttons and mic
  document.querySelectorAll('.key').forEach(k=>k.disabled=false);
  const micBtn = document.getElementById('micBtn');
  if(micBtn){
    micBtn.disabled = false;
    if(SpeechRecognition){
      document.getElementById('micLabel').textContent = '🎤 눌러서 답을 말해보세요';
    }
  }
}

function updateAnswerDisplay(){
  const ansEl = document.getElementById('qAns');
  if(state.currentInput === ''){
    ansEl.textContent = '?';
    ansEl.classList.add('empty');
    ansEl.classList.remove('filled');
  } else {
    ansEl.textContent = state.currentInput;
    ansEl.classList.remove('empty');
    ansEl.classList.add('filled');
  }
}

function submitAnswer(){
  if(state.answered) return;
  if(state.currentInput === ''){
    document.getElementById('transcript').textContent = '답을 입력하고 확인을 눌러주세요';
    return;
  }
  const p = state.pool[state.idx];
  const userAns = Number(state.currentInput);
  const correct = userAns === p.answer;
  state.answered = true;

  const fb = document.getElementById('feedback');
  if(correct){
    state.score++;
    document.getElementById('scoreText').textContent = state.score;
    fb.className = 'feedback correct';
    fb.innerHTML = `🎉 정답이에요! <span class="answer-reveal">${p.a} × ${p.b} = ${p.answer}</span>`;
    floatBadge('⭐');
  } else {
    state.wrongList.push({a:p.a, b:p.b, correct:p.answer, yours:userAns});
    const ansEl = document.getElementById('qAns');
    ansEl.classList.remove('filled');
    ansEl.classList.add('wrong');
    fb.className = 'feedback wrong';
    fb.innerHTML = `아쉬워요! <span class="answer-reveal">정답: ${p.a} × ${p.b} = ${p.answer}</span>`;
  }

  document.getElementById('nextBtn').disabled = false;
  // Disable digit keys and mic after answer
  document.querySelectorAll('.key').forEach(k=>{
    const kv = k.dataset.k;
    if(kv !== 'submit') k.disabled = true;
  });
  const micBtn = document.getElementById('micBtn');
  if(micBtn) micBtn.disabled = true;
  if(SpeechRecognition){
    document.getElementById('micLabel').textContent = correct ? '정답! 다음 문제로 이동하세요' : '아쉬워요';
  }
}

function showAnswer(){
  if(state.answered) return;
  const p = state.pool[state.idx];
  state.answered = true;
  state.wrongList.push({a:p.a, b:p.b, correct:p.answer, yours:state.currentInput === '' ? '?' : Number(state.currentInput)});
  const ansEl = document.getElementById('qAns');
  ansEl.textContent = p.answer;
  ansEl.classList.remove('empty','wrong');
  ansEl.classList.add('filled');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback wrong';
  fb.innerHTML = `정답을 확인했어요! <span class="answer-reveal">${p.a} × ${p.b} = ${p.answer}</span>`;
  document.getElementById('nextBtn').disabled = false;
  document.querySelectorAll('.key').forEach(k=>k.disabled=true);
  const micBtn = document.getElementById('micBtn');
  if(micBtn) micBtn.disabled = true;
}

function nextQuestion(){
  state.idx++;
  if(state.idx >= state.pool.length){
    showResult();
  } else {
    renderQuestion();
  }
}

/* =========================================================
   RESULT
========================================================= */
function showResult(){
  const total = state.pool.length;
  const score = state.score;
  const elapsedMs = Date.now() - state.startTime;
  const elapsedSec = Math.round(elapsedMs / 1000);
  const min = Math.floor(elapsedSec / 60);
  const sec = elapsedSec % 60;
  const timeStr = min > 0 ? `${min}분 ${sec}초` : `${sec}초`;

  const pct = score / total;
  let emoji, title;
  if(pct === 1){ emoji = '🏆'; title = '완벽해요! 만점!'; }
  else if(pct >= 0.8){ emoji = '🎉'; title = '아주 잘했어요!'; }
  else if(pct >= 0.5){ emoji = '👍'; title = '잘했어요!'; }
  else { emoji = '💪'; title = '조금 더 연습해봐요!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultTotal').textContent = total;
  document.getElementById('resultTime').textContent = `⏱️ 걸린 시간: ${timeStr}`;

  const wrongWrap = document.getElementById('wrongListWrap');
  if(state.wrongList.length === 0){
    wrongWrap.innerHTML = '';
  } else {
    const items = state.wrongList.map(w=>{
      return `<li><span>${w.a} × ${w.b} = <span class="wanted">${w.correct}</span></span><span class="yours">내 답: ${w.yours}</span></li>`;
    }).join('');
    wrongWrap.innerHTML = `
      <div class="wronglist">
        <h4>📝 틀린 문제 다시 보기</h4>
        <ul>${items}</ul>
      </div>
    `;
  }

  showScreen('screen-result');
}

/* =========================================================
   FLOAT BADGE (star animation)
========================================================= */
function floatBadge(emoji){
  const badge = document.createElement('div');
  badge.className = 'float-badge';
  badge.textContent = emoji;
  const ansEl = document.getElementById('qAns');
  const rect = ansEl.getBoundingClientRect();
  badge.style.left = (rect.left + rect.width/2 - 13) + 'px';
  badge.style.top = (rect.top + 10) + 'px';
  document.body.appendChild(badge);
  setTimeout(()=>badge.remove(), 1000);
}

/* =========================================================
   EVENT WIRING
========================================================= */
document.getElementById('homeBtn').addEventListener('click', ()=>{
  showScreen('screen-home');
});

document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('showAnswerBtn').addEventListener('click', showAnswer);

document.getElementById('resultRetryBtn').addEventListener('click', ()=>{
  startGame(state.tableId);
});
document.getElementById('resultHomeBtn').addEventListener('click', ()=>{
  showScreen('screen-home');
});

// Keypad
document.querySelectorAll('.key').forEach(k=>{
  k.addEventListener('click', ()=>{
    const val = k.dataset.k;
    if(state.answered && val !== 'submit') return;
    if(val === 'clear'){
      state.currentInput = state.currentInput.slice(0, -1);
      updateAnswerDisplay();
    } else if(val === 'submit'){
      submitAnswer();
    } else {
      // digit
      if(state.currentInput.length < 3){
        state.currentInput += val;
        updateAnswerDisplay();
      }
    }
  });
});

// Physical keyboard support
document.addEventListener('keydown', (e)=>{
  if(document.getElementById('screen-game').classList.contains('hidden')) return;
  if(e.key >= '0' && e.key <= '9'){
    if(state.answered) return;
    if(state.currentInput.length < 3){
      state.currentInput += e.key;
      updateAnswerDisplay();
    }
  } else if(e.key === 'Backspace'){
    if(state.answered) return;
    state.currentInput = state.currentInput.slice(0, -1);
    updateAnswerDisplay();
  } else if(e.key === 'Enter'){
    if(state.answered){
      if(!document.getElementById('nextBtn').disabled) nextQuestion();
    } else {
      submitAnswer();
    }
  }
});

// Mic button
document.getElementById('micBtn').addEventListener('click', ()=>{
  if(!recognition) return;
  if(state.answered) return;
  if(state.recognizing){
    try{ recognition.stop(); } catch(err){}
  } else {
    state.currentInput = '';
    updateAnswerDisplay();
    try{ recognition.start(); }
    catch(err){
      // 이미 실행 중이거나 권한 문제
      console.warn(err);
    }
  }
});

// Init
initSpeech();
renderHome();
showScreen('screen-home');
</script>
