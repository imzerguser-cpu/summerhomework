<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3학년 1반 여름방학 숙제</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f8ff;margin:0}
header{background:#4a7cff;color:#fff;padding:20px;text-align:center}
.container{max-width:700px;margin:20px auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.1)}
button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:8px;background:#4a7cff;color:#fff;font-size:16px;cursor:pointer}
#loginModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5)}
.modal{background:#fff;width:320px;margin:120px auto;padding:20px;border-radius:12px}
.rank li{display:flex;justify-content:space-between}
</style>
</head>
<body>
<header>
<h1>🌻 3학년 1반 여름방학 숙제 🌻</h1>
<p>학생을 선택하여 로그인하세요.</p>
</header>

 
<div class="container">
<div class="card">
<h2>학생 선택</h2>
<div id="students"></div>
</div>

<div class="card">
<h2>🏆 오늘의 수행 횟수</h2>
<ul class="rank" id="ranking">
<li><span>김대현</span><span>0회</span></li>
<li><span>나대한</span><span>0회</span></li>
<li><span>민주은</span><span>0회</span></li>
<li><span>백은성</span><span>0회</span></li>
<li><span>신서희</span><span>0회</span></li>
</ul>
</div>

<button onclick="teacherLogin()">👨‍🏫 교사 페이지</button>
</div>

<div id="loginModal">
<div class="modal">
<h3 id="title"></h3>
<input id="pw" type="password" placeholder="비밀번호" style="width:100%;padding:10px">
<button onclick="login()">로그인</button>
<button onclick="closeModal()">취소</button>
</div>
</div>

<script>
const students=[
"김대현","나대한","민주은","백은성","신서희"
];
let current="";
const box=document.getElementById("students");
students.forEach(n=>{
 const b=document.createElement("button");
 b.textContent=n;
 b.onclick=()=>openLogin(n);
 box.appendChild(b);
});

function openLogin(name){
 current=name;
 title.textContent=name+" 로그인";
 loginModal.style.display="block";
}
function closeModal(){loginModal.style.display="none";pw.value="";}
function login(){
 if(pw.value==="1111"){
   localStorage.setItem("student",current);
   alert(current+" 로그인 성공\n(다음 단계에서 학생 홈과 Firebase를 연결합니다.)");
 }else{
   alert("비밀번호가 올바르지 않습니다.");
 }
}
function teacherLogin(){
 const p=prompt("교사 비밀번호");
 if(p==="20260301"){
   location.href="teacher.html";
 }else if(p!==null){
   alert("비밀번호가 틀렸습니다.");
 }
}
</script>
</body>
</html>
