<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛있는 영어 - Yummy English Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF6B4A;
    --coral-dark:#E5532F;
    --mustard:#FFC93C;
    --mustard-dark:#E8AE12;
    --green:#3FA772;
    --green-dark:#2C7F55;
    --cream:#FFF7EC;
    --cream-2:#FFEFDA;
    --ink:#3A2B22;
    --ink-soft:#7A6A5D;
    --white:#FFFFFF;
    --red-soft:#FF7A70;
    --shadow: 0 8px 24px rgba(58,43,34,0.12);
    --shadow-sm: 0 4px 10px rgba(58,43,34,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,201,60,0.28) 0, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(63,167,114,0.20) 0, transparent 40%),
      var(--cream);
    font-family:'Nunito','Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:22px 18px 60px; min-height:100vh; }
  h1,h2,h3{margin:0;}
  
  .brandbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:8px; }
  .brand{ display:flex; align-items:center; gap:10px; font-family:'Jua',sans-serif; font-size:22px; color:var(--coral-dark); }
  .brand .plate{ width:34px;height:34px;border-radius:50%; background:var(--white); border:3px solid var(--coral); display:flex;align-items:center;justify-content:center; font-size:16px; flex:none; }
  .navbtns{display:flex;gap:6px;align-items:center;}
  .homebtn{ background:var(--white); border:none; border-radius:14px; padding:8px 12px; font-family:'Nunito',sans-serif; font-weight:800; font-size:12.5px; color:var(--ink-soft); box-shadow:var(--shadow-sm); cursor:pointer; display:none; white-space:nowrap; }
  .homebtn.show{display:inline-block;}

  /* Box Styles */
  .intro-box { background: var(--white); border-radius: 26px; padding: 32px 22px; box-shadow: var(--shadow); text-align: center; margin-top: 20px; }
  .intro-box h2 { font-family: 'Jua', sans-serif; font-size: 24px; margin-bottom: 20px; color: var(--ink); }
  
  /* Student Grid */
  .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-bottom: 20px; }
  .student-btn { background: var(--cream-2); border: 2px solid transparent; border-radius: 14px; padding: 12px 10px; font-size: 15px; font-weight: 800; color: var(--ink); cursor: pointer; transition: transform 0.1s, border-color 0.1s; }
  .student-btn:hover { border-color: var(--mustard); transform: translateY(-2px); }
  .student-btn:active { transform: scale(0.96); }

  /* Lists & Cards */
  .hero{ background:linear-gradient(135deg, var(--coral) 0%, #FF8A63 100%); border-radius:28px; padding:26px 24px; color:var(--white); box-shadow:var(--shadow); position:relative; overflow:hidden; margin-bottom:20px; }
  .hero h1{ font-family:'Jua',sans-serif; font-size:24px; line-height:1.4; margin-bottom:6px; }
  .listcards{ display:flex; flex-direction:column; gap:12px; }
  .listcard{ background:var(--white); border-radius:20px; padding:16px; box-shadow:var(--shadow-sm); display:flex; align-items:center; gap:14px; cursor:pointer; border:2px solid transparent; transition:transform .15s ease, border-color .15s ease; }
  .listcard:hover{transform:translateY(-2px); border-color:var(--mustard);}
  .listcard .num{ flex:none; width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Jua',sans-serif; font-size:18px; color:var(--white); }
  .listcard .body{flex:1;}
  .listcard .body h3{ font-family:'Nunito',sans-serif; font-weight:800; font-size:15px; margin-bottom:3px; }
  
  /* Game & Controls */
  .gamehead{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .gamehead h2{ font-family:'Jua',sans-serif; font-size:17px; }
  .progresswrap{ display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:var(--ink-soft); margin-top:4px; }
  .progressbar{ width:90px; height:8px; border-radius:6px; background:var(--cream-2); overflow:hidden; }
  .progressbar .fill{ height:100%; background:var(--green); transition:width .3s ease; }
  .score{ background:var(--white); border-radius:14px; padding:7px 12px; font-weight:800; font-size:13px; color:var(--coral-dark); }
  .stage{ background:var(--white); border-radius:26px; padding:26px 22px 22px; box-shadow:var(--shadow); min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  .prompttext .main{ font-family:'Jua',sans-serif; font-size:24px; text-align:center; }
  .controls{ width:100%; display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:auto; }
  .micbtn{ width:70px;height:70px; border-radius:50%; border:none; background:linear-gradient(135deg, var(--coral), var(--red-soft)); color:var(--white); font-size:27px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
  .micbtn.listening{ background:linear-gradient(135deg, var(--green), #59C48A); animation:pulse 1.1s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(63,167,114,0.55);} 70%{box-shadow:0 0 0 18px rgba(63,167,114,0);} 100%{box-shadow:0 0 0 0 rgba(63,167,114,0);} }
  
  .feedback{ width:100%; border-radius:16px; padding:12px; font-weight:800; font-size:14px; text-align:center; display:none; }
  .feedback.correct{ display:block; background:#E7F7EE; color:var(--green-dark); }
  .feedback.wrong{ display:block; background:#FFEDEA; color:var(--coral-dark); }
  
  .actionrow{ display:flex; gap:10px; width:100%; }
  .btn{ flex:1; border:none; border-radius:14px; padding:12px 10px; font-weight:800; font-size:13.5px; cursor:pointer; }
  .btn.primary{ background:var(--coral); color:var(--white); }
  .btn.ghost{ background:var(--cream-2); color:var(--ink-soft); }
  .btn.next{ background:var(--green); color:var(--white); }
  .btn[disabled]{ opacity:0.45; cursor:not-allowed; }
  .hidden{ display:none !important; }

  /* Modals & Tables */
  .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; display:flex; align-items:center; justify-content:center; }
  .modal-content { background:#fff; width:90%; max-width:480px; border-radius:20px; padding:25px; box-shadow:0 10px 30px rgba(0,0,0,0.3); max-height:90vh; overflow-y:auto; }
  .modal-input { padding:14px; border-radius:12px; border:2px solid var(--cream-2); outline:none; text-align:center; font-size:18px; width:100%; letter-spacing:4px; font-weight:bold; }
  .modal-input:focus { border-color:var(--coral); }
  
  .record-table { width: 100%; border-collapse: collapse; font-size: 13.5px; text-align: center; margin-top:10px; }
  .record-table th { background: var(--cream-2); padding: 10px; border-bottom: 2px solid var(--mustard); font-weight:800; color:var(--ink); }
  .record-table td { padding: 10px; border-bottom: 1px solid #eee; color:var(--ink-soft); vertical-align:middle; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand"><span class="plate">🍽️</span> 맛있는 영어 퀴즈</div>
    <div class="navbtns">
      <button onclick="openTeacherTab()" class="homebtn show" id="teacherTopBtn" style="background:#5D5046; color:#fff;">👨‍🏫 선생님 탭</button>
      <button class="homebtn" id="introNavBtn" onclick="showScreen('intro')">👤 로그아웃</button>
      <button class="homebtn" id="dashBtn" onclick="showScreen('dashboard')">🏠 내 기록</button>
      <button class="homebtn" id="gradeBtn" onclick="showScreen('grade')">🎓 학년</button>
      <button class="homebtn" id="unitMenuBtn" onclick="showScreen('unitmenu')">🔁 게임</button>
    </div>
  </div>

  <div id="screen-intro">
    <div class="intro-box">
      <h2>자신의 이름을 선택하세요 👋</h2>
      <p style="font-size:14px; color:var(--ink-soft); margin-bottom:20px;">이름을 누르고 비밀번호를 입력하면 내 기록을 볼 수 있어요.</p>
      <div class="student-grid" id="studentGrid">
        </div>
    </div>
  </div>

  <div id="screen-dashboard" class="hidden">
    <div class="intro-box">
      <h2 id="dashStudentName">OOO 학생의 기록</h2>
      <div style="max-height: 250px; overflow-y: auto; margin-bottom:15px;">
        <table class="record-table">
          <thead><tr><th>날짜</th><th>단원</th><th>점수</th></tr></thead>
          <tbody id="studentRecordBody"></tbody>
        </table>
      </div>
      <div class="actionrow">
        <button class="btn primary" onclick="showScreen('grade')" style="padding:16px; font-size:16px;">🚀 학습 시작하기</button>
      </div>
    </div>
  </div>

  <div id="screen-grade" class="hidden">
    <div class="hero">
      <h1>초등 영어 연습<br>단원을 선택하세요</h1>
    </div>
    <div class="listcards" id="unitList"></div>
  </div>

  <div id="screen-unitmenu" class="hidden">
    <div class="hero">
      <h1 id="unitHeroTitle">단원 학습</h1>
    </div>
    <div class="listcards" id="modeList"></div>
  </div>

  <div id="screen-game" class="hidden">
    <div class="gamehead">
      <div>
        <h2 id="gameTitle">게임</h2>
        <div class="progresswrap">
          <div class="progressbar"><div class="fill" id="progressFill"></div></div>
          <span id="progressText">1 / 17</span>
        </div>
      </div>
      <div class="score">⭐ <span id="scoreText">0</span></div>
    </div>

    <div class="stage">
      <div class="prompttext">
        <div class="main" id="promptMain"></div>
      </div>
      <div class="controls">
        <div class="feedback" id="feedback"></div>
        <button class="micbtn" id="micBtn">🎤</button>
        <div style="font-size:12px; color:var(--ink-soft); margin-top:5px;" id="micLabel">마이크를 눌러 말해보세요</div>
        <div class="actionrow" style="margin-top:15px;">
          <button class="btn ghost" id="showAnswerBtn">정답 보기</button>
          <button class="btn next" id="nextBtn" disabled>다음 →</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <div class="intro-box">
      <div style="font-size:50px; margin-bottom:10px;">🎉</div>
      <h2>학습 완료!</h2>
      <div style="font-family:'Fredoka',sans-serif; font-size:34px; color:var(--coral-dark); margin:12px 0;">
        <span id="resultScore">0</span> / <span id="resultTotal">0</span>
      </div>
      <p style="color:var(--ink-soft); font-size:14px; margin-bottom:20px;">결과가 내 기록에 저장되었습니다.</p>
      <div class="actionrow" style="flex-direction:column;">
        <button class="btn primary" onclick="startGame(state.modeId)">이 게임 다시 하기</button>
        <button class="btn ghost" onclick="showScreen('dashboard')">내 기록 보기</button>
        <button class="btn ghost" onclick="showScreen('grade')">다른 단원 선택</button>
      </div>
    </div>
  </div>
</div>

<div id="modal-student-login" class="modal-overlay hidden">
  <div class="modal-content" style="text-align:center;">
    <h2 id="loginTitle" style="color:var(--ink); margin-top:0;">비밀번호 입력</h2>
    <p style="font-size:13px; color:var(--ink-soft);">본인 확인을 위해 4자리 비밀번호를 입력하세요.</p>
    <input type="password" id="studentPwdInput" class="modal-input" maxlength="4" placeholder="••••" style="margin:15px 0;">
    <div class="actionrow">
      <button class="btn primary" onclick="verifyStudentPassword()">확인</button>
      <button class="btn ghost" onclick="closeModals()">취소</button>
    </div>
  </div>
</div>

<div id="modal-teacher" class="modal-overlay hidden">
  <div class="modal-content">
    
    <div id="teacher-auth-zone">
      <h2 style="text-align:center; color:var(--ink); margin-top:0;">👨‍🏫 선생님 탭</h2>
      <p style="text-align:center; font-size:13px; color:var(--ink-soft);">관리자 비밀번호를 입력해 주세요.</p>
      <input type="password" id="teacherPwdInput" class="modal-input" placeholder="비밀번호" style="margin:15px 0; letter-spacing:normal;">
      <div class="actionrow">
        <button class="btn primary" onclick="verifyTeacherPassword()">접속</button>
        <button class="btn ghost" onclick="closeModals()">닫기</button>
      </div>
    </div>

    <div id="teacher-dashboard-zone" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0; color:var(--green-dark); font-size:18px;">👥 학생 비밀번호 및 기록 관리</h2>
        <button onclick="closeModals()" style="background:var(--ink-soft); color:#fff; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:bold; font-size:12px;">닫기</button>
      </div>
      
      <div style="max-height:300px; overflow-y:auto; border:2px solid var(--cream-2); border-radius:12px; margin-bottom:15px;">
        <table class="record-table">
          <thead>
            <tr><th>이름</th><th>비밀번호(수정)</th><th>기록 초기화</th></tr>
          </thead>
          <tbody id="adminStudentList"></tbody>
        </table>
      </div>
      
      <div style="text-align:right;">
        <button onclick="clearAllRecords()" style="background:var(--red-soft); color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:bold;">🚨 반 전체 기록 싹 지우기</button>
      </div>
    </div>

  </div>
</div>

<script>
/* =========================================================
   1. 데이터 설정
========================================================= */
// 퀴즈 문제 데이터
const QUIZ_DATA = [
  {
    "id": "u1", "title": "Lesson 1. Hello! I'm Dito",
    "modes": {
      "word": [
        { "ko": "안녕", "en": "hello" },
        { "ko": "나는 ~야", "en": "i am" }
      ]
    }
  },
  {
    "id": "u2", "title": "Lesson 2. What's this?",
    "modes": {
      "word": [
        { "ko": "이것은 무엇이니?", "en": "what's this" },
        { "ko": "그것은 연필이야", "en": "it is a pencil" }
      ]
    }
  }
];

// 학생 목록 (기본값 세팅, 브라우저 스토리지에 저장되어 변경값 유지됨)
let students = JSON.parse(localStorage.getItem('english_students')) || [
  { id: 's1', name: '김민준', password: '1111' },
  { id: 's2', name: '이서윤', password: '2222' },
  { id: 's3', name: '박도윤', password: '3333' },
  { id: 's4', name: '최지아', password: '4444' },
  { id: 's5', name: '정하준', password: '5555' }
];

// 학생들 전체 기록 배열 [{ studentId, date, unitTitle, score }]
let records = JSON.parse(localStorage.getItem('english_records')) || [];
const ADMIN_PWD = "20260301";

let state = {
  screen: 'intro',
  currentUser: null,
  unitId: null,
  modeId: null,
  questions: [],
  currentIdx: 0,
  score: 0,
  answered: false
};

/* =========================================================
   2. 초기 설정 및 화면 전환 로직
========================================================= */
window.onload = () => {
  renderStudentGrid();
  showScreen('intro');
  
  // 엔터키 지원
  document.getElementById('studentPwdInput').addEventListener('keypress', e => { if(e.key === 'Enter') verifyStudentPassword(); });
  document.getElementById('teacherPwdInput').addEventListener('keypress', e => { if(e.key === 'Enter') verifyTeacherPassword(); });
};

function showScreen(screenName) {
  state.screen = screenName;
  const screens = ['intro', 'dashboard', 'grade', 'unitmenu', 'game', 'result'];
  screens.forEach(s => document.getElementById(`screen-${s}`).classList.add('hidden'));
  document.getElementById(`screen-${screenName}`).classList.remove('hidden');
  
  // 상단 네비게이션 버튼 노출 관리
  const navs = ['introNavBtn', 'dashBtn', 'gradeBtn', 'unitMenuBtn', 'teacherTopBtn'];
  navs.forEach(id => document.getElementById(id).classList.remove('show'));
  
  document.getElementById('teacherTopBtn').classList.add('show');
  
  if(screenName !== 'intro') {
    document.getElementById('introNavBtn').classList.add('show'); // 로그아웃 역할
    if(screenName !== 'dashboard') document.getElementById('dashBtn').classList.add('show');
  }
  if(['unitmenu', 'game'].includes(screenName)) document.getElementById('gradeBtn').classList.add('show');
}

/* =========================================================
   3. 학생 선택 및 로그인 로직
========================================================= */
function renderStudentGrid() {
  const grid = document.getElementById('studentGrid');
  grid.innerHTML = '';
  students.forEach(s => {
    grid.innerHTML += `<button class="student-btn" onclick="openStudentLogin('${s.id}')">${s.name}</button>`;
  });
}

let targetStudentId = null;
function openStudentLogin(id) {
  targetStudentId = id;
  const s = students.find(x => x.id === id);
  document.getElementById('loginTitle').textContent = `${s.name} 학생`;
  document.getElementById('studentPwdInput').value = '';
  document.getElementById('modal-student-login').classList.remove('hidden');
  setTimeout(() => document.getElementById('studentPwdInput').focus(), 100);
}

function verifyStudentPassword() {
  const s = students.find(x => x.id === targetStudentId);
  const pwd = document.getElementById('studentPwdInput').value.trim();
  
  if (pwd === s.password) {
    state.currentUser = s;
    closeModals();
    renderStudentDashboard();
    showScreen('dashboard');
  } else {
    alert("비밀번호가 일치하지 않습니다. 다시 확인해주세요!");
  }
}

function renderStudentDashboard() {
  document.getElementById('dashStudentName').textContent = `${state.currentUser.name} 학생의 기록`;
  const tbody = document.getElementById('studentRecordBody');
  tbody.innerHTML = '';
  
  const myRecords = records.filter(r => r.studentId === state.currentUser.id);
  if (myRecords.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="color:var(--ink-soft);">아직 기록이 없습니다. 파이팅!</td></tr>';
  } else {
    // 최신 기록이 위로 오게 역순
    [...myRecords].reverse().forEach(r => {
      tbody.innerHTML += `<tr><td>${r.date}</td><td>${r.unitTitle}</td><td style="color:var(--coral-dark); font-weight:bold;">${r.score}</td></tr>`;
    });
  }
  renderUnitList(); // 학습 시작 시 보일 단원 세팅
}

/* =========================================================
   4. 선생님 관리자 로직 (비밀번호 조회/변경 및 기록 초기화)
========================================================= */
function openTeacherTab() {
  document.getElementById('modal-teacher').classList.remove('hidden');
  document.getElementById('teacher-auth-zone').classList.remove('hidden');
  document.getElementById('teacher-dashboard-zone').classList.add('hidden');
  document.getElementById('teacherPwdInput').value = '';
  setTimeout(() => document.getElementById('teacherPwdInput').focus(), 100);
}

function verifyTeacherPassword() {
  const inputPwd = document.getElementById('teacherPwdInput').value.trim();
  if (inputPwd === ADMIN_PWD) {
    document.getElementById('teacher-auth-zone').classList.add('hidden');
    document.getElementById('teacher-dashboard-zone').classList.remove('hidden');
    renderAdminStudentList();
  } else {
    alert("비밀번호가 올바르지 않습니다.");
  }
}

function renderAdminStudentList() {
  const tbody = document.getElementById('adminStudentList');
  tbody.innerHTML = '';
  students.forEach(s => {
    tbody.innerHTML += `
      <tr>
        <td style="font-weight:bold; color:var(--ink);">${s.name}</td>
        <td>
          <input type="text" id="admin-pwd-${s.id}" value="${s.password}" style="width:60px; text-align:center; padding:4px; border:1px solid #ccc; border-radius:4px;">
          <button onclick="saveStudentPwd('${s.id}')" style="background:var(--green); color:#fff; border:none; padding:5px 8px; border-radius:4px; font-size:12px; cursor:pointer;">저장</button>
        </td>
        <td>
          <button onclick="resetSingleStudent('${s.id}')" style="background:var(--coral-dark); color:#fff; border:none; padding:5px 10px; border-radius:4px; font-size:12px; cursor:pointer;">기록 리셋</button>
        </td>
      </tr>
    `;
  });
}

function saveStudentPwd(id) {
  const newPwd = document.getElementById(`admin-pwd-${id}`).value.trim();
  if(!newPwd) return alert("비밀번호를 입력해주세요.");
  const s = students.find(x => x.id === id);
  s.password = newPwd;
  localStorage.setItem('english_students', JSON.stringify(students));
  alert(`${s.name} 학생의 비밀번호가 [ ${newPwd} ](으)로 변경되었습니다.`);
}

function resetSingleStudent(id) {
  const s = students.find(x => x.id === id);
  if(confirm(`${s.name} 학생의 모든 학습 기록을 삭제하시겠습니까? (복구 불가)`)) {
    records = records.filter(r => r.studentId !== id);
    localStorage.setItem('english_records', JSON.stringify(records));
    alert("삭제되었습니다.");
  }
}

function clearAllRecords() {
  if(confirm("모든 학생의 학습 기록을 완전히 초기화하시겠습니까? (복구 불가)")) {
    records = [];
    localStorage.removeItem('english_records');
    alert("전체 기록이 초기화되었습니다.");
  }
}

function closeModals() {
  document.getElementById('modal-student-login').classList.add('hidden');
  document.getElementById('modal-teacher').classList.add('hidden');
}

/* =========================================================
   5. 퀴즈 진행 로직
========================================================= */
function renderUnitList() {
  const list = document.getElementById('unitList');
  list.innerHTML = '';
  QUIZ_DATA.forEach((u, idx) => {
    const card = document.createElement('div');
    card.className = 'listcard';
    card.innerHTML = `<div class="num" style="background:var(--mustard)">${idx+1}</div><div class="body"><h3>${u.title}</h3></div>`;
    card.onclick = () => {
      state.unitId = u.id;
      document.getElementById('unitHeroTitle').textContent = u.title;
      renderModeList(u);
      showScreen('unitmenu');
    };
    list.appendChild(card);
  });
}

function renderModeList(u) {
  const list = document.getElementById('modeList');
  list.innerHTML = '';
  if(u.modes.word) {
    const card = document.createElement('div');
    card.className = 'listcard';
    card.innerHTML = `<div class="num" style="background:var(--coral)">🍎</div><div class="body"><h3>낱말 익히기</h3></div>`;
    card.onclick = () => startGame('word');
    list.appendChild(card);
  }
}

function startGame(mode) {
  state.modeId = mode;
  const u = QUIZ_DATA.find(x => x.id === state.unitId);
  state.questions = [...u.modes[mode]];
  state.currentIdx = 0;
  state.score = 0;
  
  document.getElementById('gameTitle').textContent = '낱말 익히기';
  showScreen('game');
  loadQuestion();
}

function loadQuestion() {
  state.answered = false;
  const q = state.questions[state.currentIdx];
  document.getElementById('progressText').textContent = `${state.currentIdx + 1} / ${state.questions.length}`;
  document.getElementById('progressFill').style.width = `${((state.currentIdx + 1)/state.questions.length)*100}%`;
  document.getElementById('scoreText').textContent = state.score;
  document.getElementById('promptMain').textContent = q.ko;
  
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.style.display = 'none';
  document.getElementById('nextBtn').disabled = true;
  document.getElementById('micLabel').textContent = "마이크를 눌러 말해보세요";
}

function processAnswer(text) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIdx];
  const fb = document.getElementById('feedback');
  
  if (text.toLowerCase().includes(q.en.toLowerCase())) {
    state.score++;
    document.getElementById('scoreText').textContent = state.score;
    fb.className = 'feedback correct';
    fb.innerHTML = `🎉 정답! ${q.en}`;
  } else {
    fb.className = 'feedback wrong';
    fb.innerHTML = `틀렸어요! 정답: ${q.en}`;
  }
  fb.style.display = 'block';
  document.getElementById('nextBtn').disabled = false;
}

document.getElementById('showAnswerBtn').onclick = () => {
  if(state.answered) return;
  processAnswer("wrong_answer_forced"); 
};

document.getElementById('nextBtn').onclick = () => {
  state.currentIdx++;
  if(state.currentIdx < state.questions.length) {
    loadQuestion();
  } else {
    saveRecord();
    document.getElementById('resultScore').textContent = state.score;
    document.getElementById('resultTotal').textContent = state.questions.length;
    showScreen('result');
  }
};

function saveRecord() {
  if(!state.currentUser) return;
  const today = new Date();
  const dateStr = `${today.getMonth()+1}/${today.getDate()} ${today.getHours()}:${String(today.getMinutes()).padStart(2,'0')}`;
  const u = QUIZ_DATA.find(x => x.id === state.unitId);
  
  records.push({
    studentId: state.currentUser.id,
    date: dateStr,
    unitTitle: u.title,
    score: `${state.score}/${state.questions.length}`
  });
  localStorage.setItem('english_records', JSON.stringify(records));
}

// 음성 인식 로직
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  
  recognition.onstart = () => {
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micLabel').textContent = "듣고 있어요...";
  };
  recognition.onend = () => {
    document.getElementById('micBtn').classList.remove('listening');
  };
  recognition.onresult = (e) => {
    processAnswer(e.results[0][0].transcript);
  };
  
  document.getElementById('micBtn').onclick = () => {
    if(!state.answered) recognition.start();
  };
} else {
  document.getElementById('micLabel').textContent = "이 브라우저는 음성 인식을 지원하지 않습니다.";
}
</script>
