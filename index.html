<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>맛있는 영어 - Yummy English Quiz (전 단원)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&family=Nunito:wght@500;700;800&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --coral:#FF6B4A;
    --coral-dark:#E5532F;
    --mustard:#FFC93C;
    --mustard-dark:#E8AE12;
    --green:#3FA772;
    --green-dark:#2C7F55;
    --cream:#FFF7EC;
    --cream-2:#FFEFDA;
    --ink:#3A2B22;
    --ink-soft:#7A6A5D;
    --white:#FFFFFF;
    --red-soft:#FF7A70;
    --shadow: 0 8px 24px rgba(58,43,34,0.12);
    --shadow-sm: 0 4px 10px rgba(58,43,34,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 8% 12%, rgba(255,201,60,0.28) 0, transparent 42%),
      radial-gradient(circle at 92% 88%, rgba(63,167,114,0.20) 0, transparent 40%),
      var(--cream);
    font-family:'Nunito','Noto Sans KR',sans-serif;
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    max-width:640px;
    margin:0 auto;
    padding:22px 18px 60px;
    min-height:100vh;
  }
  h1,h2,h3{margin:0;}
  .brandbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    gap:8px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Jua',sans-serif;
    font-size:22px;
    color:var(--coral-dark);
  }
  .brand .plate{
    width:34px;height:34px;border-radius:50%;
    background:var(--white);
    border:3px solid var(--coral);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex:none;
  }
  .navbtns{display:flex;gap:6px;}
  .homebtn{
    background:var(--white);
    border:none;
    border-radius:14px;
    padding:8px 12px;
    font-family:'Nunito',sans-serif;
    font-weight:800;
    font-size:12.5px;
    color:var(--ink-soft);
    box-shadow:var(--shadow-sm);
    cursor:pointer;
    display:none;
    white-space:nowrap;
  }
  .homebtn.show{display:inline-block;}

  .hero{

    border-radius:28px;
