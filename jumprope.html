  if(e.target.classList&&e.target.classList.contains('ec-inp')&&pendingRerender){
    setTimeout(()=>{if(!isUserTyping()){pendingRerender=false;R();}},100);
  }
});

db.ref('.info/connected').on('value',(snap)=>{syncStatus=snap.val()?'online':'offline';rSt();});

const eS=()=>{const o={};EV.forEach(e=>o[e.id]="");return o;};
const dS=()=>{const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0');};
const dToHtml=d=>(d||'').replace(/\./g,'-');const dToDisp=d=>(d||'').replace(/-/g,'.');
const es=(ev,v)=>{if(v===""||v==null)return 0;const n=parseFloat(v);if(isNaN(n))return 0;for(let i=0;i<ev.th.length;i++)if(n>=ev.th[i])return 10-i;return 0;};
const cT=sc=>EV.reduce((s,e)=>s+es(e,sc[e.id]),0);
const gG=t=>{for(const g of GT)if(t>=g.m)return g;return{m:0,g:"급수 없음",n:0};};
const gc=n=>n?"gc-"+n:"gc-0";const gcb=n=>n?"gcb-"+n:"";const gct=n=>n?"gct-"+n:"";
const hM=m=>m&&Object.values(m.scores).some(v=>v!=="");const hA=s=>s.ms.some(hM);
const sC=sc=>`hsl(${(sc/10)*120},65%,42%)`;const mC=()=>S[0]?S[0].ms.length:0;
const fS=()=>S.filter(s=>(fG==="전체"||s.gr===fG)&&(!sT||s.nm.includes(sT)));
const gl=g=>g==="유치원"?"유치원":g+"학년";
const bI=s=>{let bt=-1,bi=0;s.ms.forEach((m,i)=>{const t=cT(m.scores);if(t>bt){bt=t;bi=i;}});return bi;};
const enM=s=>{while(s.ms.length<mC()){const idx=s.ms.length;s.ms.push({date:S[0].ms[idx]?S[0].ms[idx].date:dS(),scores:eS()});}};

function addMA(dv){const d=dv||dS();S.forEach(s=>s.ms.push({date:d,scores:eS()}));cM=mC()-1;saveToCloud();R();}
function delMA(i){if(mC()<=1)return;S.forEach(s=>{if(i<s.ms.length)s.ms.splice(i,1);});if(cM>=mC())cM=mC()-1;saveToCloud();R();}
function changeMDate(mi,nd){if(!nd)return;S.forEach(s=>{if(s.ms[mi])s.ms[mi].date=nd;});saveToCloud();R();}

function svF(){dlF(JSON.stringify({v:5,cM,students:S.map(s=>({gr:s.gr,nm:s.nm,gd:s.gd,ms:s.ms}))},null,2),`줄넘기_전체기록_${dS()}.json`,'application/json');sm('💾 파일 저장!');}
function dlF(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}
function exCSV(){const mc=mC();if(!mc){sm('⚠️ 데이터 없음');return;}let c='\uFEFF측정회차,측정일자,학년,이름,성별';EF.forEach(n=>c+=','+n);c+=',총점,급수\n';for(let mi=0;mi<mc;mi++){const dt=S[0].ms[mi]?.date||'';S.forEach(s=>{if(mi>=s.ms.length)return;const m=s.ms[mi],t=cT(m.scores),g=gG(t);c+=`${mi+1}차,${dToDisp(dt)},${gl(s.gr)},${s.nm},${s.gd}`;EV.forEach(e=>c+=`,${m.scores[e.id]}`);c+=`,${t},${g.g}\n`;});}dlF(c,`줄넘기_기록_${dS()}.csv`,'text/csv;charset=utf-8;');sm('📊 엑셀!');}
function impF(){document.getElementById('fi').click();}
document.getElementById('fi').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const ext=f.name.split('.').pop().toLowerCase();const r=new FileReader();r.onload=function(ev){if(ext==='json'){try{const d=JSON.parse(ev.target.result),arr=d.s||d.students;if(!arr)throw 0;arr.forEach(ld=>{const ex=S.find(s=>s.gr===(ld.gr||ld.grade)&&s.nm===(ld.nm||ld.name));if(ex&&(ld.ms||ld.measurements))ex.ms=ld.ms||ld.measurements;});cM=Math.max(0,mC()-1);saveToCloud();sm('📂 완료!');R();}catch(err){alert('오류');}}};r.readAsText(f);e.target.value='';});

function sm(msg){const el=document.getElementById('smsg');if(el){el.textContent=msg;el.classList.add('on');clearTimeout(smT);smT=setTimeout(()=>el.classList.remove('on'),3000);}}
function modal(title,desc,fn){document.getElementById('mr').innerHTML=`<div class="mo" onclick="clM()"><div class="mod" onclick="event.stopPropagation()"><h3>${title}</h3><p>${desc}</p><div class="mod-b"><button class="mod-btn mod-c" onclick="clM()">취소</button><button class="mod-btn mod-d" id="mcf">확인</button></div></div></div>`;document.getElementById('mcf').onclick=()=>{fn();clM();};}
function clM(){document.getElementById('mr').innerHTML='';}

document.getElementById('tabs').addEventListener('click',function(e){const b=e.target.closest('.tab');if(!b)return;cV=b.dataset.v;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t===b));['vInput','vTable','vHistory','vRef'].forEach(id=>document.getElementById(id).style.display='none');document.getElementById({input:'vInput',table:'vTable',history:'vHistory',ref:'vRef'}[cV]).style.display='';document.getElementById('filterBar').style.display=cV==='ref'?'none':'';R();});

function R(){rSt();rSB();rFB();({input:rI,table:rT,history:rH,ref:rR})[cV]();}

function rSt(){
  const mc=mC(),last=mc-1;const comp=mc>0?S.filter(s=>s.ms.length>last&&hM(s.ms[last])):[];
  const dist={};comp.forEach(s=>{const g=gG(cT(s.ms[last].scores));dist[g.g]=(dist[g.g]||0)+1;});
  let h=`<span>👤 <strong>${S.length}</strong>명</span><span>📏 <strong>${mc}</strong>회차</span><span>📝 <strong>${comp.length}</strong>명</span>`;
  Object.entries(dist).sort().slice(0,4).forEach(([g,c])=>{const n=GT.find(x=>x.g===g);h+=`<span><span class="gbsm ${gc(n?n.n:0)}">${g}</span>${c}</span>`;});
  const sl={connecting:'연결중...',online:'☁️ 동기화',offline:'오프라인',error:'오류'},sd={connecting:'sync-off',online:'sync-on',offline:'sync-off',error:'sync-err'};
  h+=`<span class="sync-ind"><span class="sync-dot ${sd[syncStatus]}"></span>${sl[syncStatus]}</span>`;document.getElementById('st').innerHTML=h;
}
function rSB(){document.getElementById('saveBar').innerHTML=`<div class="sbar"><button class="sbtn b-save" onclick="svF()">💾 백업</button><button class="sbtn b-load" onclick="impF()">📂 불러오기</button><button class="sbtn b-exp" onclick="exCSV()">📊 엑셀</button><button class="sbtn b-rst" onclick="modal('⚠️ 초기화','모든 기기에서 삭제됩니다!',function(){S.forEach(function(s){s.ms=[]});cM=0;saveToCloud();R();sm('🗑️ 완료');})">🗑️</button><div class="smsg" id="smsg"></div></div>`;}
function rFB(){const f=fS();let h='<div class="fbar"><div class="gfilters">';AG.forEach(g=>{h+=`<button class="gfb ${fG===g?'on':''}" data-g="${g}">${g==="전체"?"전체":gl(g)}</button>`;});h+=`</div><input class="sinp" type="text" placeholder="🔍 이름" value="${sT}" id="sb"><span class="fcnt">${f.length}명</span></div>`;const el=document.getElementById('filterBar');el.innerHTML=h;el.querySelector('.gfilters').addEventListener('click',e=>{const b=e.target.closest('.gfb');if(b){fG=b.dataset.g;R();}});document.getElementById('sb').addEventListener('input',e=>{sT=e.target.value;R();});}

function rI(){
  const fs=fS(),mc=mC();
  let h='<div class="mbar"><label>📏 회차:</label>';
  if(mc===0){h+=`<input type="date" class="date-inp" id="newDate" value="${dS()}"><button class="mbtn b-am" onclick="addMA(document.getElementById('newDate').value)">+ 1차 측정 시작</button>`;}
  else{h+='<select class="msel" id="msl">';for(let i=0;i<mc;i++)h+=`<option value="${i}" ${cM===i?'selected':''}>${i+1}차 (${dToDisp(S[0].ms[i].date)})</option>`;h+=`</select><input type="date" class="date-inp" id="curDate" value="${dToHtml(S[0].ms[cM]?.date)}"><button class="mbtn b-am" onclick="addWithDate()">+ 추가</button>`;if(mc>1)h+=`<button class="mbtn b-dm" onclick="modal('${cM+1}차 삭제','삭제됩니다.',function(){delMA(${cM});})">🗑️</button>`;}
  h+='</div>';
  if(mc===0){h+='<div class="empty"><div class="empty-i">📏</div><div class="empty-t">날짜를 선택하고 측정을 시작하세요</div></div>';document.getElementById('vInput').innerHTML=h;return;}
  fs.forEach((s,si)=>{
    enM(s);const m=s.ms[cM],t=cT(m.scores),g=gG(t),hi=hM(m);
    h+=`<div class="sc" data-sid="${s.id}"><div class="sc-hd"><div class="sc-info"><span class="sc-gt">${gl(s.gr)}</span><span class="sc-nm">${s.nm}</span><span class="sc-gd">${s.gd}</span>`;
    if(s.ms.length>1)h+=`<span class="sc-mc">${s.ms.length}회</span>`;
    h+=`</div><div class="sc-res"><div style="text-align:right"><div class="sc-tl">총점</div><div class="sc-tv" id="tv${s.id}">${hi?t:'-'}</div></div><span class="gbg ${hi?gc(g.n):'gc-0'}" id="gb${s.id}">${hi?g.g:'-'}</span></div></div><div class="sg">`;
    EV.forEach((ev,ei)=>{const v=m.scores[ev.id],sc=es(ev,v),pct=(sc/10)*100,bc=sc>0?sC(sc):'#E0E7EF';
      h+=`<div class="ec"><div class="ec-nm">${EF[ei]}</div><div class="ec-row"><input class="ec-inp" type="text" inputmode="decimal" value="${v}" placeholder="${ev.t?'초':'개수'}" data-sid="${s.id}" data-eid="${ev.id}" data-si="${si}" data-ei="${ei}" autocomplete="off"><span class="ec-u">${ev.u}</span></div><div class="ec-sr"><div class="sb"><div class="sbf" style="width:${pct}%;background:${bc}"></div></div><span class="ec-sc" style="color:${sc>0?sC(sc):'#D0D8E0'}">${sc}점</span></div></div>`;});
    h+=`</div><div class="sum"><div class="sum-h">오래뛰기: 초 단위 (2분30초→150)</div><div><span class="sum-t" id="st${s.id}">${t}</span><span class="sum-m"> / 80</span></div></div></div>`;});
  const el=document.getElementById('vInput');el.innerHTML=h;
  const cd=document.getElementById('curDate');if(cd)cd.addEventListener('change',e=>{changeMDate(cM,e.target.value);});
  const ms=document.getElementById('msl');if(ms)ms.addEventListener('change',e=>{cM=parseInt(e.target.value);R();});

  // ★ Input handler - NEVER re-renders, only updates DOM in-place ★
  el.addEventListener('input',function(e){
    if(!e.target.classList.contains('ec-inp'))return;
    let val=e.target.value.replace(/[^0-9.]/g,'');
    if(val!==e.target.value){const pos=e.target.selectionStart-1;e.target.value=val;e.target.setSelectionRange(Math.max(0,pos),Math.max(0,pos));}
    const sid=parseInt(e.target.dataset.sid),eid=e.target.dataset.eid;
    const s=S.find(x=>x.id===sid);if(!s||!s.ms[cM])return;
    s.ms[cM].scores[eid]=val;
    const card=e.target.closest('.ec'),ev=EV.find(x=>x.id===eid),sc=es(ev,val);
    card.querySelector('.sbf').style.width=(sc/10*100)+'%';card.querySelector('.sbf').style.background=sc>0?sC(sc):'#E0E7EF';
    const scl=card.querySelector('.ec-sc');scl.textContent=sc+'점';scl.style.color=sc>0?sC(sc):'#D0D8E0';
    const t2=cT(s.ms[cM].scores),g2=gG(t2),hi2=hM(s.ms[cM]);
    const tvE=document.getElementById('tv'+sid);if(tvE)tvE.textContent=hi2?t2:'-';
    const gbE=document.getElementById('gb'+sid);if(gbE){gbE.textContent=hi2?g2.g:'-';gbE.className='gbg '+(hi2?gc(g2.n):'gc-0');}
    const stE=document.getElementById('st'+sid);if(stE)stE.textContent=t2;
    rSt();saveToCloud();
  });
  el.addEventListener('keydown',function(e){
    if(!e.target.classList.contains('ec-inp'))return;
    if(e.key==='Enter'||e.key==='Tab'){e.preventDefault();const card=e.target.closest('.sc'),inputs=Array.from(card.querySelectorAll('.ec-inp')),idx=inputs.indexOf(e.target);
      if(idx<inputs.length-1){inputs[idx+1].focus();inputs[idx+1].select();}
      else{const all=Array.from(document.querySelectorAll('.sc')),ci=all.indexOf(card);if(ci<all.length-1){const ni=all[ci+1].querySelector('.ec-inp');if(ni){ni.focus();ni.select();ni.scrollIntoView({behavior:'smooth',block:'center'});}}}}
  });
}

window.addWithDate=function(){modal('📅 새 측정','<input type="date" id="addDP" value="'+dS()+'" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-family:inherit;">',function(){addMA(document.getElementById('addDP')?.value||dS());});};
function shareDate(mi){const d={v:5,measurement:mi+1,date:S[0].ms[mi]?.date||'',students:S.map(s=>{const m=s.ms[mi];if(!m)return null;const t=cT(m.scores),g=gG(t);return{gr:s.gr,nm:s.nm,gd:s.gd,scores:m.scores,total:t,grade:g.g};}).filter(Boolean)};dlF(JSON.stringify(d,null,2),`줄넘기_${mi+1}차_${S[0].ms[mi]?.date||dS()}.json`,'application/json');sm('📤 공유 저장!');}

function rT(){const fs=fS(),mc=mC();let h='<div class="tw">';if(mc>0){h+='<div class="mtbar">';for(let i=0;i<mc;i++)h+=`<button class="mtb ${rM===i?'on':''}" data-rm="${i}">${i+1}차 (${dToDisp(S[0].ms[i].date).slice(5)})</button>`;if(mc>1)h+=`<button class="mtb ${rM===-1?'on':''}" data-rm="-1">🏆 최고</button>`;h+='</div>';}h+='<table class="rt"><thead><tr><th>#</th><th>학년</th><th>이름</th>';EV.forEach((e,i)=>h+=`<th>${EF[i]}<br><span style="font-size:7px;opacity:.6">(${e.u})</span></th>`);h+='<th>총점</th><th>급수</th></tr></thead><tbody>';fs.forEach((s,i)=>{let m;if(rM===-1){m=s.ms.length>0?s.ms[bI(s)]:{scores:eS()};}else{m=s.ms[rM]||{scores:eS()};}const t=cT(m.scores),g=gG(t),hi=hM(m);h+=`<tr><td style="color:var(--tx3)">${i+1}</td><td><span class="sc-gt">${gl(s.gr)}</span></td><td style="font-weight:700">${s.nm}</td>`;EV.forEach(e=>{const v=m.scores[e.id],sc=es(e,v);if(v!==""){const c=sc>=7?'var(--green)':sc>=4?'#CA8A04':'var(--red)';h+=`<td style="font-weight:700">${v}<br><span style="font-size:9px;font-weight:800;color:${c}">${sc}점</span></td>`;}else h+=`<td class="td-e">-</td>`;});h+=`<td class="td-t">${hi?t:'-'}</td>`;h+=hi?`<td><span class="gbg ${gc(g.n)}" style="font-size:10px;padding:2px 8px">${g.g}</span></td>`:`<td class="td-e">-</td>`;h+='</tr>';});h+='</tbody></table></div>';const el=document.getElementById('vTable');el.innerHTML=h;el.addEventListener('click',e=>{const b=e.target.closest('[data-rm]');if(b){rM=parseInt(b.dataset.rm);R();}});}

function mkSC(s){if(s.ms.length<1)return '';const mc=s.ms.length,w=Math.max(280,mc*70+60),bH=120,mT=80;let v=`<svg class="chart-svg" width="${w}" height="${bH+44}" viewBox="0 0 ${w} ${bH+44}">`;for(let i=0;i<=4;i++){const y=10+bH-(i/4)*bH;v+=`<line x1="40" y1="${y}" x2="${w-10}" y2="${y}" stroke="#E0E7EF"/><text x="36" y="${y+3}" text-anchor="end" font-size="9" fill="#A4B3C2">${Math.round(mT*i/4)}</text>`;}const bW=Math.min(36,Math.max(20,(w-80)/mc-8));s.ms.forEach((m,i)=>{const t=cT(m.scores),x=50+i*((w-70)/mc),h2=(t/mT)*bH,g=gG(t),cls=['#9CA3AF','#7C3AED','#2563EB','#0D9488','#16A34A','#65A30D','#CA8A04','#D97706','#EA580C','#DC2626','#B91C1C'],cl=g.n?cls[g.n]:'#9CA3AF';v+=`<rect x="${x}" y="${10+bH-h2}" width="${bW}" height="${h2}" rx="3" fill="${cl}" opacity=".85"/><text x="${x+bW/2}" y="${10+bH-h2-4}" text-anchor="middle" font-size="10" font-weight="800" fill="${cl}">${t}</text><text x="${x+bW/2}" y="${bH+28}" text-anchor="middle" font-size="9" fill="#6B7D8F">${i+1}차</text><text x="${x+bW/2}" y="${bH+40}" text-anchor="middle" font-size="7" fill="#A4B3C2">${dToDisp(m.date).slice(5)}</text>`;});v+=`</svg>`;return v;}
function mkEC(s){if(s.ms.length<2)return '';const mc=s.ms.length,w=Math.max(280,mc*60+80),h=130,p=45,tp=15;let v=`<svg class="chart-svg" width="${w}" height="${h+45}" viewBox="0 0 ${w} ${h+45}">`;for(let i=0;i<=5;i++){const y=tp+(h/5)*(5-i);v+=`<line x1="${p}" y1="${y}" x2="${w-10}" y2="${y}" stroke="#F0F3F7"/><text x="${p-4}" y="${y+3}" text-anchor="end" font-size="8" fill="#A4B3C2">${i*2}</text>`;}for(let mi=0;mi<mc;mi++){const x=p+mi*((w-p-10)/(mc-1||1));v+=`<text x="${x}" y="${h+tp+14}" text-anchor="middle" font-size="9" fill="#6B7D8F">${mi+1}차</text><text x="${x}" y="${h+tp+24}" text-anchor="middle" font-size="7" fill="#A4B3C2">${dToDisp(s.ms[mi].date).slice(5)}</text>`;}EV.forEach(ev=>{const pts=s.ms.map((m,mi)=>{const sc=es(ev,m.scores[ev.id]),x=p+mi*((w-p-10)/(mc-1||1)),y=tp+h-(sc/10)*h;return{x,y};});let d='';pts.forEach((pt,i)=>{d+=(i===0?'M':'L')+pt.x+' '+pt.y;});v+=`<path d="${d}" fill="none" stroke="${ev.color}" stroke-width="2" stroke-linecap="round" opacity=".7"/>`;pts.forEach(pt=>{v+=`<circle cx="${pt.x}" cy="${pt.y}" r="3" fill="${ev.color}"/>`;});});v+=`</svg>`;return v;}
function mkGF(s){if(s.ms.length<1)return '';let h='<div class="grade-flow">';s.ms.forEach((m,i)=>{const t=cT(m.scores),g=gG(t);if(i>0){const pt=cT(s.ms[i-1].scores),d=t-pt;h+=`<div class="gf-arrow">${d>0?'→ <span style="color:var(--green);font-weight:800">▲+'+d+'</span>':d<0?'→ <span style="color:var(--red);font-weight:800">▼'+d+'</span>':'→ <span style="color:var(--tx3)">＝</span>'}</div>`;}h+=`<div class="gf-item"><div class="gf-label">${i+1}차 (${dToDisp(m.date).slice(5)})</div><span class="gbg ${gc(g.n)}" style="font-size:11px;padding:2px 8px">${g.g}</span><div style="font-size:10px;font-weight:800;margin-top:2px">${t}점</div></div>`;});h+='</div>';return h;}

function rH(){const fs=fS(),mc=mC();if(!mc){document.getElementById('vHistory').innerHTML='<div class="empty"><div class="empty-i">📈</div><div class="empty-t">측정 기록 없음</div></div>';return;}let h='';fs.forEach(s=>{if(!hA(s))return;const bi=bI(s),io=openH[s.id]!==false;h+=`<div class="h-card"><div class="h-hd" data-hid="${s.id}"><div class="sc-info"><span class="sc-gt">${gl(s.gr)}</span><span class="sc-nm">${s.nm}</span><span class="sc-gd">${s.gd}</span></div><div class="sc-res">`;if(s.ms.length>0){const bt=cT(s.ms[bi].scores),bg=gG(bt);h+=`<div style="text-align:right"><div class="sc-tl">최고</div><div class="sc-tv">${bt}</div></div><span class="gbg ${gc(bg.n)}">${bg.g}</span>`;}h+=`<span class="h-toggle ${io?'open':''}">▼</span></div></div>`;if(io){h+=`<div class="h-body">`;h+=`<div class="chart-section"><div class="chart-title">🏅 급수 변화</div>${mkGF(s)}</div>`;if(s.ms.length>=1)h+=`<div class="chart-section"><div class="chart-title">📊 총점 변화</div><div class="chart-wrap">${mkSC(s)}</div></div>`;if(s.ms.length>=2){h+=`<div class="chart-section"><div class="chart-title">📈 종목별 점수 변화</div><div class="chart-wrap">${mkEC(s)}</div><div class="legend">`;EV.forEach((ev,i)=>{h+=`<span class="legend-item"><span class="legend-dot" style="background:${ev.color}"></span>${EF[i]}</span>`;});h+=`</div></div>`;}h+=`<div class="chart-section"><div class="chart-title">📋 상세 기록</div><div style="overflow:auto"><table class="ht"><thead><tr><th>회차</th><th>날짜</th>`;EV.forEach((e,i)=>h+=`<th>${EF[i]}</th>`);h+=`<th>총점</th><th>급수</th></tr></thead><tbody>`;const bE={};EV.forEach(e=>{let b=-1;s.ms.forEach(m=>{const v=parseFloat(m.scores[e.id]);if(!isNaN(v)&&v>b)b=v;});bE[e.id]=b;});let bT=-1;s.ms.forEach(m=>{const t=cT(m.scores);if(t>bT)bT=t;});s.ms.forEach((m,mi)=>{const t=cT(m.scores),g=gG(t);h+=`<tr><td style="font-weight:700">${mi+1}차</td><td style="font-size:9px;color:var(--tx3)">${dToDisp(m.date)}</td>`;EV.forEach(e=>{const v=m.scores[e.id],nv=parseFloat(v),ib=!isNaN(nv)&&nv===bE[e.id]&&s.ms.length>1;if(v!==""){const sc=es(e,v);h+=`<td class="${ib?'htb':''}">${v} <span style="font-size:8px;color:${sc>=7?'var(--green)':sc>=4?'#CA8A04':'var(--red)'}">${sc}</span></td>`;}else h+=`<td class="td-e">-</td>`;});const ibt=t===bT&&s.ms.length>1&&t>0;h+=`<td style="font-weight:900;${ibt?'color:var(--green)':''}">${t}</td><td><span class="gbg ${gc(g.n)}" style="font-size:9px;padding:2px 7px">${g.g}</span></td></tr>`;});h+=`</tbody></table></div></div></div>`;}h+=`</div>`;});if(!h)h='<div class="empty"><div>입력된 기록이 없습니다.</div></div>';const el=document.getElementById('vHistory');el.innerHTML=h;el.addEventListener('click',e=>{const hdr=e.target.closest('[data-hid]');if(hdr){const id=parseInt(hdr.dataset.hid);openH[id]=openH[id]===false?true:false;rH();}});}

function rR(){let h='<div class="rs"><div class="rh"><div class="rh-t">📋 종목별 점수 기준표</div><div class="rh-d">대한줄넘기협회 제정</div></div><table class="rft"><thead><tr><th>종목</th>';for(let i=10;i>=1;i--)h+=`<th>${i}점</th>`;h+='</tr></thead><tbody>';EV.forEach((e,i)=>{h+=`<tr><td class="ecol">${EF[i]}<small>(${e.u})</small></td>`;e.lb.forEach(l=>h+=`<td>${l}</td>`);h+='</tr>';});h+='</tbody></table></div>';h+='<div class="rs"><div class="rh"><div class="rh-t">🏅 급수 기준표</div><div class="rh-d">8종목 총점 합계 (만점 80점)</div></div><div class="gcards">';GT.forEach(g=>{h+=`<div class="gci ${gcb(g.n)}"><div class="gci-n ${gct(g.n)}">${g.g}</div><div class="gci-m" style="color:var(--tx2)">${g.m}점 이상</div></div>`;});h+='</div></div>';h+=`<div class="ibox"><h3>💡 사용 안내</h3><p><strong>☁️ 실시간 동기화:</strong> 어디서든 입력하면 모든 기기에 자동 반영.<br><strong>📅 날짜 지정:</strong> 측정 추가 시 날짜 선택 가능.<br><strong>💾 백업:</strong> 만약을 위해 파일로 백업 추천.<br><strong>📊 엑셀:</strong> CSV 내보내기 가능.<br><strong>⌨️ 입력:</strong> 숫자 직접 입력. Enter/Tab→다음. 오래뛰기는 초 (2분30초→150).</p></div>`;document.getElementById('vRef').innerHTML=h;}

R();
</script>
</body>
